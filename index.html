<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scan Tracker – Shared Control Room</title>

<!-- ✅ REQUIRED: Firebase SDKs (THIS WAS THE BUG) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: system-ui, Segoe UI, Roboto, Arial;
  background: linear-gradient(180deg,#0b1020,#0f172a);
  color: #e5e7eb;
}
header {
  position: sticky; top: 0;
  background: rgba(15,23,42,.9);
  border-bottom: 1px solid #1f2937;
}
.wrap { max-width: 1400px; margin: auto; padding: 16px; }
.row { display:flex; gap:8px; align-items:center; }
.spacer { flex:1; }
.btn {
  background:#1f2937; color:#e5e7eb;
  border:1px solid #374151;
  padding:6px 10px; border-radius:8px;
  cursor:pointer;
}
.btn.success { background:#22c55e; color:#0b1320; }
.btn.primary { background:#06b6d4; color:#0b1320; }
.pill {
  background:#111827; border:1px solid #374151;
  padding:6px 10px; border-radius:999px;
  font-size:12px;
}
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(260px,1fr));
  gap:12px;
  margin-top:12px;
}
.card {
  background:#0b1320;
  border:1px solid #1f2937;
  border-radius:12px;
  padding:10px;
}
.status-dot {
  width:8px; height:8px; border-radius:50%;
  display:inline-block; margin-right:6px;
}
.green { background:#22c55e; }
.amber { background:#f59e0b; }
.red { background:#ef4444; }
.toast {
  position:fixed; right:12px; bottom:12px;
  background:#111827; border:1px solid #374151;
  padding:10px 14px; border-radius:10px;
}
.hidden { display:none; }
</style>
</head>

<body>
<header>
  <div class="wrap row">
    <h2>Scan Tracker</h2>
    <span class="spacer"></span>
    <span id="connStatus" class="pill">Connecting…</span>
    <span id="soundStatus" class="pill">🔈 Sound: On</span>
  </div>
</header>

<main class="wrap">
  <div class="row">
    <button class="btn success" id="btnAdd">Add Site</button>
  </div>
  <div id="grid" class="grid"></div>
</main>

<div id="toast" class="toast hidden"></div>

<script>
/* ================= FIREBASE CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDmKMFAYJh62i9rbahj0aiK4rBqj16U0mA",
  authDomain: "add-realtime-database-d2571.firebaseapp.com",
  databaseURL: "https://add-realtime-database-d2571-default-rtdb.firebaseio.com",
  projectId: "add-realtime-database-d2571",
  storageBucket: "add-realtime-database-d2571.appspot.com",
  messagingSenderId: "222911556574",
  appId: "1:222911556574:web:76f3f1301a601b18848b4f"
};
const ROOM_ID = "control-room";

/* ================= INIT FIREBASE ================= */
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const stateRef = db.ref("rooms/" + ROOM_ID + "/state");
const connRef = db.ref(".info/connected");

/* ================= AUDIO (RELIABLE) ================= */
let audioCtx;
function unlockAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
}
function ping() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.frequency.value = 1000;
  o.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.2, audioCtx.currentTime+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+0.5);
  o.start(); o.stop(audioCtx.currentTime+0.5);
}
window.addEventListener("pointerdown", ()=>{ unlockAudio(); ping(); }, { once:true });

/* ================= STATE ================= */
let state = { sites: [] };
let lastWriteId = null;

/* ================= HELPERS ================= */
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.remove("hidden");
  setTimeout(()=>t.classList.add("hidden"),2000);
}
function id(){ return Math.random().toString(36).slice(2,9); }

/* ================= RENDER ================= */
function render(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  state.sites.forEach(s=>{
    const d=document.createElement("div");
    d.className="card";
    d.innerHTML=`
      <strong>${s.name}</strong>
      <div style="margin-top:8px">
        <button class="btn primary" data-id="${s.id}">Scan Now</button>
      </div>
    `;
    d.querySelector("button").onclick=()=>{
      toast("Scan logged");
      ping();
    };
    grid.appendChild(d);
  });
}

/* ================= SYNC ================= */
connRef.on("value", snap=>{
  document.getElementById("connStatus").textContent =
    snap.val() ? "🟢 Connected" : "🔴 Offline";
});

stateRef.on("value", snap=>{
  const remote=snap.val();
  if(!remote){
    state.sites=[
      {id:id(), name:"Site A"},
      {id:id(), name:"Site B"}
    ];
    const payload={...state,_meta:{id:id()}};
    lastWriteId=payload._meta.id;
    stateRef.set(payload);
    return;
  }
  if(remote._meta?.id===lastWriteId) return;
  state=remote;
  render();
});

/* ================= ACTIONS ================= */
document.getElementById("btnAdd").onclick=()=>{
  const name=prompt("Site name?");
  if(!name) return;
  state.sites.push({id:id(), name});
  const payload={...state,_meta:{id:id()}};
  lastWriteId=payload._meta.id;
  stateRef.set(payload);
};
</script>
</body>
</html>
